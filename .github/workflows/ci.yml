name: Contract drift gate

on:
  pull_request:
    paths:
      - 'apps/visualizer/**'
      - 'docs/adr/**'

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/visualizer/backend/requirements.txt
          pip install -e .

      - name: Install frontend dependencies
        working-directory: apps/visualizer/frontend
        run: npm ci --legacy-peer-deps

      - name: Regenerate OpenAPI types and fail on drift
        working-directory: apps/visualizer/frontend
        run: |
          npm run generate:api
          git diff --exit-code src/types/api.gen.ts

      - name: Typecheck frontend
        working-directory: apps/visualizer/frontend
        run: npx tsc --noEmit

      - name: Backend tests (spectree response validation on Jobs routes)
        working-directory: apps/visualizer/backend
        run: python -m pytest tests/ --ignore=tests/e2e -q
