# Contract drift gate — install into .github/workflows/ by a maintainer.
# Do NOT commit this file under .github/workflows/ from the sandcastle agent
# (GitHub App pushes are rejected for workflow files).

name: Contract drift gate

on:
  pull_request:
    paths:
      - 'apps/visualizer/**'
      - 'docs/adr/**'

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/visualizer/backend/requirements.txt
          pip install -e .

      - name: Install frontend dependencies
        working-directory: apps/visualizer/frontend
        run: npm ci --legacy-peer-deps

      - name: Regenerate OpenAPI types and fail on drift
        working-directory: apps/visualizer/frontend
        run: |
          npm run generate:api
          git diff --exit-code src/types/api.gen.ts

      - name: Typecheck frontend
        working-directory: apps/visualizer/frontend
        run: npx tsc --noEmit

      # Scope: all migrated contract groups (V1–V7). Each slice appends its tests here.
      - name: Backend contract tests (spectree response validation, migrated groups)
        working-directory: apps/visualizer/backend
        run: python -m pytest tests/test_job_contract.py tests/test_jobs_api.py tests/test_job_transition_routes.py tests/test_perspectives_contract.py tests/test_perspectives_api.py tests/test_providers_contract.py tests/test_providers_api.py tests/test_catalog_contract.py tests/test_stacks_contract.py tests/test_instagram_contract.py tests/test_search_contract.py tests/test_config_contract.py tests/test_matches_contract.py tests/test_matches_api_pin.py tests/test_match_groups.py tests/test_match_validation.py tests/test_descriptions_contract.py tests/test_scores_contract.py tests/test_analytics_contract.py tests/test_identity_contract.py tests/test_system_contract.py tests/test_api_ts_contract_guardrail.py tests/test_thumbnail_endpoints.py -q
