site: instagram
name: images
description: "Get image URLs from a specific Instagram post (handles carousels)"
domain: www.instagram.com
strategy: cookie
browser: true

args:
  post_url:
    type: string
    required: true
    description: "Full URL of the Instagram post, e.g. https://www.instagram.com/p/xxx/"

pipeline:
  - navigate: ${{ args.post_url }}
  - wait: 4
  - evaluate: |
      (async () => {
        const sleep = ms => new Promise(res => setTimeout(res, ms));
        const imageUrls = new Set();
        
        const collectImages = () => {
          const article = document.querySelector('article');
          if (!article) return;
          const imgs = Array.from(article.querySelectorAll('img'));
          for (const img of imgs) {
            // Ignore tiny profile pics, fetch actual post content
            if (img.src && img.src.includes('scontent') && !img.src.includes('150x150')) {
              imageUrls.add(img.src);
            }
          }
        };

        collectImages();

        // Handle carousels by clicking Next until it disappears
        let nextBtn = document.querySelector('button[aria-label="Next"]');
        let attempts = 0;
        while (nextBtn && attempts < 10) {
          nextBtn.click();
          await sleep(1000); 
          collectImages();
          nextBtn = document.querySelector('button[aria-label="Next"]');
          attempts++;
        }

        return Array.from(imageUrls).map(url => ({ image_url: url }));
      })()

  - map:
      image_url: ${{ item.image_url }}

columns: [image_url]
