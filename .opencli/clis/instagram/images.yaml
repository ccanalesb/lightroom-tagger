site: instagram
name: images
description: "Get image URLs from an Instagram post by reading network requests made by the browser"
domain: www.instagram.com
strategy: cookie
browser: true

args:
  post_url:
    type: string
    required: true
    description: "Full URL of the Instagram post, e.g. https://www.instagram.com/p/xxx/"

pipeline:
  - navigate: ${{ args.post_url }}

  - wait: 6

  - evaluate: |
      (async () => {
        // Dump all network resource requests the browser made on this page.
        // Instagram loads images from fbcdn.net CDN — we filter for those.
        const entries = performance.getEntriesByType('resource');
        const imageUrls = new Set();

        for (const entry of entries) {
          const url = entry.name;
          // Only grab CDN image requests — skip scripts, fonts, API calls
          if (
            (url.includes('fbcdn.net') || url.includes('cdninstagram.com')) &&
            (url.includes('.jpg') || url.includes('.jpeg') || url.includes('.webp') || url.includes('.png')) &&
            !url.includes('150x150') &&
            !url.includes('_s.')
          ) {
            imageUrls.add(url);
          }
        }

        return Array.from(imageUrls).map(url => ({ image_url: url }));
      })()

  - map:
      image_url: ${{ item.image_url }}

columns: [image_url]
